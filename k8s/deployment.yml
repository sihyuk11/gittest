apiVersion: apps/v1
kind: Deployment

metadata:
  name: test-dep8

spec:
  replicas: 1

  selector:
    matchLabels:
      app: test-dep8

  template:
    metadata:
      labels:
        app: test-dep8

    spec:
      containers:
      - name: test-dep8
        image: sihyuk11/jenkins:v1
        imagePullPolicy: Always

        ports:
        - containerPort: 9999
